<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#FAF8F5"/>
    <!-- face -->
    <circle cx="100" cy="115" r="58" fill="#C8463C"/>
    <!-- long nose (signature feature) -->
    <path d="M 100 115 L 100 165 L 110 162 L 110 118 Z" fill="#A53A30"/>
    <ellipse cx="100" cy="115" rx="10" ry="8" fill="#A53A30"/>
    <!-- eyes (fierce) -->
    <path d="M 65 105 L 85 110 L 80 118 L 65 113 Z" fill="#1A1A1A"/>
    <path d="M 135 105 L 115 110 L 120 118 L 135 113 Z" fill="#1A1A1A"/>
    <!-- white eyebrows -->
    <path d="M 60 92 L 88 88" stroke="#FAF8F5" stroke-width="4" stroke-linecap="round"/>
    <path d="M 140 92 L 112 88" stroke="#FAF8F5" stroke-width="4" stroke-linecap="round"/>
    <!-- mouth (subtle smile) -->
    <path d="M 88 148 Q 100 155 112 148" stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- white beard hint -->
    <path d="M 85 165 Q 100 175 115 165" fill="#FAF8F5" stroke="#FAF8F5" stroke-width="2"/>
</svg>