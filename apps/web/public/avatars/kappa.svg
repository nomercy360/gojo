    <circle cx="100" cy="115" r="58" fill="#7CA87A"/>
    <!-- beak/mouth area -->
    <ellipse cx="100" cy="138" rx="20" ry="14" fill="#D4A248"/>
    <!-- eyes -->
    <circle cx="78" cy="108" r="9" fill="#FAF8F5"/>
    <circle cx="122" cy="108" r="9" fill="#FAF8F5"/>
    <circle cx="78" cy="108" r="4.5" fill="#1A1A1A"/>
    <circle cx="122" cy="108" r="4.5" fill="#1A1A1A"/>
    <!-- beak line -->
    <path d="M 88 138 L 112 138" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <!-- cheek dots -->
    <circle cx="62" cy="125" r="3" fill="#5A8060" opacity="0.5"/>
    <circle cx="138" cy="125" r="3" fill="#5A8060" opacity="0.5"/>
