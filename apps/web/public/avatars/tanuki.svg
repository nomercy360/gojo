    <!-- mouth -->
    <path d="M 100 144 Q 95 150 90 147" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 100 144 Q 105 150 110 147" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
