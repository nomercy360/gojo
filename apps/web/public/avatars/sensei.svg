<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#FAF8F5"/>
    <!-- bald head with grey hair sides -->
    <ellipse cx="100" cy="115" rx="55" ry="58" fill="#F5DCC4"/>
    <!-- grey hair on sides -->
    <path d="M 45 115 Q 42 90 55 75 Q 50 100 50 130 Z" fill="#8B847A"/>
    <path d="M 155 115 Q 158 90 145 75 Q 150 100 150 130 Z" fill="#8B847A"/>
    <!-- top of head bald shine -->
    <ellipse cx="100" cy="80" rx="32" ry="20" fill="#F5DCC4"/>
    <!-- round glasses -->
    <circle cx="78" cy="118" r="14" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
    <circle cx="122" cy="118" r="14" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
    <line x1="92" y1="118" x2="108" y2="118" stroke="#1A1A1A" stroke-width="2.5"/>
    <!-- eyes behind glasses (closed/wise smile) -->
    <path d="M 71 118 Q 78 113 85 118" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 115 118 Q 122 113 129 118" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- white mustache -->
    <path d="M 80 148 Q 100 145 120 148 Q 100 155 80 148 Z" fill="#FAF8F5" stroke="#8B847A" stroke-width="1.5"/>
    <!-- subtle smile under mustache -->
    <path d="M 92 158 Q 100 162 108 158" stroke="#1A1A1A" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- white beard -->
    <path d="M 85 165 Q 100 180 115 165 Q 110 175 100 175 Q 90 175 85 165 Z" fill="#FAF8F5" stroke="#8B847A" stroke-width="1.5"/>
</svg>