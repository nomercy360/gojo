name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: gojo
          POSTGRES_PASSWORD: gojo
          POSTGRES_DB: gojo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gojo -d gojo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 1025:1025
          - 8025:8025
    env:
      CI: "true"
      DATABASE_URL: postgres://gojo:gojo@localhost:5432/gojo
      API_ORIGIN: http://localhost:3001
      WEB_ORIGIN: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      JWT_SECRET: e2e-ci-secret-at-least-32-characters
      SMTP_HOST: localhost
      SMTP_PORT: 1025
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Chromium
        run: bunx playwright install --with-deps --only-shell chromium
      - name: Run E2E tests
        run: bun run test:e2e
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
