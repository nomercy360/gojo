services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: gojo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gojo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gojo}
    volumes:
      - pg_data:/var/lib/postgresql
      - ../infra/init/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gojo}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gojo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gojo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/$${S3_BUCKET:-gojo} &&
      mc anonymous set download local/$${S3_BUCKET:-gojo} &&
      echo 'bucket ready'
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-gojo}

  livekit:
    image: livekit/livekit-server:latest
    container_name: gojo-livekit
    restart: unless-stopped
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?set LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET:?set LIVEKIT_API_SECRET}"
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    command: --dev --bind 0.0.0.0

  api:
    image: ${GOJO_IMAGE_API:-ghcr.io/nomercy360/gojo-api:latest}
    pull_policy: always
    container_name: gojo-api
    restart: unless-stopped
    # api.telegram.org publishes an AAAA record, but the docker network has no
    # IPv6 route, so Bun's fetch stalls on IPv6 and lead pings silently failed.
    # Pin it to Telegram's (stable) IPv4 so resolution stays IPv4 and SNI/cert
    # remain valid. If Telegram ever moves this IP, leads still save — only the
    # ping breaks. Verified: container reaches getMe in ~135ms with this.
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # better-auth baseURL (used for absolute URLs + origin validation) and
      # the trusted-origins allowlist. API_ORIGIN must be the ORIGIN only
      # (no /api path) — Caddy strips /api before the container, so auth
      # routes are matched at /auth/*. A baseURL with /api → 404; empty
      # trustedOrigins → 403 INVALID_ORIGIN.
      API_ORIGIN: ${API_ORIGIN:-https://gojolearn.ru}
      # Public web origin — used to build password-reset / verification links
      # in emails. Must be the site origin, not the API path.
      WEB_ORIGIN: ${WEB_ORIGIN:-https://gojolearn.ru}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-https://gojolearn.ru}
      DATABASE_URL: postgres://${POSTGRES_USER:-gojo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gojo}
      REDIS_URL: redis://redis:6379
      API_PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      ALLOW_DEV_LOGIN: ${ALLOW_DEV_LOGIN:-false}
      LIVEKIT_URL: ${LIVEKIT_URL:-ws://livekit:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:?set S3_PUBLIC_URL}
      S3_REGION: us-east-1
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-gojo}
      # New-lead notifications: token + target chat. Values live in .env.prod
      # (never committed). If unset, leads still save — the ping is skipped.
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_LEAD_CHAT_ID: ${TELEGRAM_LEAD_CHAT_ID:-}
      # Transactional email (verification, password reset) — SMTP, provider-
      # agnostic. Values live in .env.prod (never committed). Unset SMTP_HOST
      # falls back to localhost:1025, which doesn't exist in prod, so mail
      # sends will fail (logged, not fatal) until this is configured.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Gojo Learn <no-reply@gojolearn.ru>}
      # Error monitoring — its own Sentry project, separate from web's, so
      # backend vs frontend errors triage separately. Unset = no-ops.
      SENTRY_DSN: ${SENTRY_DSN_API:-}
      # Claude first-pass homework review. Lives in .env.prod. Unset = AI
      # pass skipped; submissions wait for the teacher as raw text.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Resend transactional email (HTTP API on 443 — VM SMTP ports blocked).
      # Unset falls back to SMTP. Sender domain must be verified in Resend.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}

  web:
    image: ${GOJO_IMAGE_WEB:-ghcr.io/nomercy360/gojo-web:latest}
    pull_policy: always
    container_name: gojo-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?set PUBLIC_API_URL}
      # Web's own Sentry project (server/edge side — runtime env is fine
      # here). Same project's DSN the CLIENT bundle uses, but the client one
      # (NEXT_PUBLIC_SENTRY_DSN) must be a build ARG (see apps/web/Dockerfile
      # + deploy.yml) — a runtime env here can't reach an already-built bundle.
      SENTRY_DSN: ${SENTRY_DSN_WEB:-}

  caddy:
    image: caddy:2-alpine
    container_name: gojo-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  pg_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
