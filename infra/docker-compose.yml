services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: gojo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gojo
      POSTGRES_PASSWORD: gojo
      POSTGRES_DB: gojo
    ports:
      - "5432:5432"
    volumes:
      # PG18 image stores data under /var/lib/postgresql/<major>, so we mount
      # the parent directory. A new path ("pg18") avoids silently adopting any
      # legacy ./data/postgres cluster left over from earlier PG16 configs.
      - ./data/pg18:/var/lib/postgresql
      - ./init/01-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gojo -d gojo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gojo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gojo-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: gojo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/gojo-dev &&
      mc anonymous set download local/gojo-dev &&
      echo 'minio bucket ready'
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: gojo-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  livekit:
    image: livekit/livekit-server:latest
    container_name: gojo-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit-server.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    # `host.docker.internal` resolves to the Docker host. Required for the
    # webhook URL (api runs on host during dev). host-gateway injection works
    # on linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  livekit-egress:
    image: livekit/egress:latest
    container_name: gojo-egress
    restart: unless-stopped
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./livekit-egress.yaml:/etc/egress.yaml:ro
    # Egress runs a headless chromium to render the room composite → needs
    # SYS_ADMIN. Image is ~2GB, first pull is slow.
    cap_add:
      - SYS_ADMIN
    depends_on:
      livekit:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
